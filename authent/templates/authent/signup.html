<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% comment %} <link rel="stylesheet" href="{% static 'authent/css/style.css' %}"> {% endcomment %}
</head>
<body>
    <div class="signup-form">
  <h2>Sign Up</h2>
  <div class="social_media">
    <div class="social_icon">
      <ion-icon name="logo-google" class="google"></ion-icon>
      <ion-icon name="logo-facebook" class="facebook"></ion-icon>
      <ion-icon name="logo-twitter" class="twitter"></ion-icon>
      <ion-icon name="logo-github" class="github"></ion-icon>
    </div>
  </div>
  <form action="signup.php" method="POST">
    <div class="input-group">
      <label for="signup-name">Name:</label>
      <input
        type="text"
        id="signup-name"
        name="name"
        required
        placeholder="Name"
      />
    </div>
    <div class="input-group">
      <label for="signup-email">Email:</label>
      <input
        type="email"
        id="signup-email"
        name="email"
        required
        placeholder="Email"
      />
    </div>
    <div class="input-group">
      <label for="signup-password">Password:</label>
      <input
        type="password"
        id="signup-password"
        name="password"
        required
        placeholder="Password"
      />
    </div>
    <div class="input-group">
      <label for="signup-password">Password:</label>
      <input
        type="confirm_password"
        id="signup-password"
        name="password"
        required
        placeholder="Confirm Password"
      />
    </div>
    <button type="submit" class="btn">Sign Up</button>
    <p>Already have an account? <a href="{% url 'login' %}" id="show-login">Login</a></p>
  </form>
</div>

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<script src="{% static 'authent/js/script.js' %}"></script>
</body>
</html>
